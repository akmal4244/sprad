<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact us</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="panel">
      <p class="brand">Contact Desk</p>
      <h1>Contact us</h1>
      <form id="contactForm">
        <label for="name">Name</label>
        <input id="name" name="name" autocomplete="name" required>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
        <button type="submit">Send</button>
      </form>
      <p id="msg" class="message message-success"></p>
    </section>
  </main>
  <script>
    const URL = "https://script.google.com/macros/s/AKfycbyvO77bqueo45EPyAKW6jUK8R5AEIVvFLjqGhlK1Sv5s8N6ay7anY9QhGLSZaIznApkiQ/exec";
    const form = document.querySelector("#contactForm");
    const msg = document.querySelector("#msg");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form));

      await fetch(URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
      });

      msg.textContent = "Thanks! We'll get back to you.";
      form.reset();
    });
  </script>
</body>
</html>
