<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPRAD | Penilaian risiko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="icon" type="image/webp" href="https://www.akm.gov.my/templates/yootheme/cache/91/JATA%20NEGARA%20AI-01-91eac591.webp">
  <link rel="apple-touch-icon" href="https://www.akm.gov.my/templates/yootheme/cache/91/JATA%20NEGARA%20AI-01-91eac591.webp">
  <meta name="theme-color" content="#2563eb">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
  <div id="toast" class="fixed right-4 top-20 z-[100] hidden w-[calc(100%-2rem)] max-w-sm rounded-xl border border-slate-200 bg-white p-4 shadow-xl shadow-slate-200/80">
    <div class="flex gap-3">
      <div id="toastIcon" class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-50 text-blue-600">
        <i class="fa-solid fa-circle-info"></i>
      </div>
      <div>
        <p id="toastTitle" class="text-sm font-extrabold text-slate-900"></p>
        <p id="toastText" class="mt-1 text-xs font-semibold leading-5 text-slate-500"></p>
      </div>
    </div>
  </div>

  <header class="bg-white border-b border-gray-100 shadow-sm z-50 h-16 sticky top-0">
    <div class="mx-auto flex h-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="index.html" class="flex items-center gap-3">
        <img src="https://www.akm.gov.my/templates/yootheme/cache/91/JATA%20NEGARA%20AI-01-91eac591.webp" alt="Jata Negara" class="h-10 w-10 object-contain drop-shadow-sm">
        <div>
          <p class="text-base font-extrabold tracking-tight text-slate-800">SPRAD</p>
          <p class="text-[9px] font-semibold uppercase tracking-widest text-slate-500">Sistem Penilaian Risiko Audit Dalam</p>
        </div>
      </a>
      <nav class="hidden items-center gap-6 text-xs font-bold uppercase tracking-wide text-slate-600 sm:flex">
        <a href="view.html" class="hover:text-blue-600">Dashboard</a>
        <button id="logout" type="button" class="rounded-full bg-slate-900 px-4 py-2 text-white transition hover:bg-black">Log keluar</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto grid min-h-[calc(100vh-4rem)] w-full max-w-7xl gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[280px_1fr] lg:px-8">
    <aside class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-[11px] font-extrabold uppercase tracking-widest text-slate-400">Menu pengguna</p>
      <div class="mt-4 space-y-2">
        <a href="form.html" class="flex items-center gap-3 rounded-lg bg-blue-50 px-4 py-3 text-sm font-extrabold text-blue-600">
          <i class="fa-solid fa-clipboard-list w-4"></i>
          Penilaian risiko
        </a>
        <a href="view.html" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-500 transition hover:bg-slate-100 hover:text-slate-900">
          <i class="fa-solid fa-table-list w-4"></i>
          Semua penilaian
        </a>
      </div>
      <div class="mt-6 rounded-xl border border-slate-200 bg-slate-50 p-4">
        <p class="text-xs font-extrabold uppercase tracking-widest text-slate-400">Status</p>
        <p class="mt-3 text-xl font-extrabold text-emerald-600">Dibuka</p>
        <p class="mt-2 text-xs font-semibold leading-5 text-slate-500">Borang sedia menerima penilaian risiko audit daripada pengguna.</p>
      </div>
    </aside>

    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <div class="mb-6 flex flex-col gap-2 border-b border-slate-100 pb-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-xs font-extrabold uppercase tracking-widest text-blue-600">Borang SPRAD</p>
          <h1 class="mt-2 text-2xl font-extrabold tracking-tight text-slate-900 sm:text-3xl">Penilaian risiko</h1>
        </div>
        <p class="text-sm font-semibold text-slate-500">Sila isi semua medan wajib.</p>
      </div>
      <form id="contactForm" class="grid gap-4">
        <label class="block">
          <span class="text-xs font-extrabold uppercase tracking-wide text-slate-500">Nama</span>
          <input id="name" name="name" autocomplete="name" required class="mt-2 w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-800 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
        </label>
        <label class="block">
          <span class="text-xs font-extrabold uppercase tracking-wide text-slate-500">E-mel</span>
          <input id="email" name="email" type="email" autocomplete="email" required class="mt-2 w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-800 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
        </label>
        <label class="block">
          <span class="text-xs font-extrabold uppercase tracking-wide text-slate-500">Catatan risiko</span>
          <textarea id="message" name="message" required class="mt-2 min-h-40 w-full resize-y rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold leading-6 text-slate-800 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100"></textarea>
        </label>
        <button type="submit" class="flex w-full items-center justify-center gap-2 rounded-full bg-blue-600 px-5 py-3 text-sm font-extrabold text-white shadow-lg shadow-blue-100 transition hover:-translate-y-0.5 hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-100 sm:w-auto sm:px-8">
          <i class="fa-solid fa-paper-plane"></i>
          Hantar penilaian
        </button>
      </form>
      <p id="msg" class="min-h-6 pt-4 text-sm font-bold text-emerald-600"></p>
    </section>
  </main>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbyvO77bqueo45EPyAKW6jUK8R5AEIVvFLjqGhlK1Sv5s8N6ay7anY9QhGLSZaIznApkiQ/exec";
    const form = document.querySelector("#contactForm");
    const msg = document.querySelector("#msg");
    const logout = document.querySelector("#logout");
    let toastTimer;

    function showToast(title, text, type = "info") {
      const toast = document.querySelector("#toast");
      const toastTitle = document.querySelector("#toastTitle");
      const toastText = document.querySelector("#toastText");
      const toastIcon = document.querySelector("#toastIcon");
      const styles = {
        success: ["bg-emerald-50 text-emerald-600", "fa-solid fa-circle-check"],
        error: ["bg-red-50 text-red-600", "fa-solid fa-circle-exclamation"],
        info: ["bg-blue-50 text-blue-600", "fa-solid fa-circle-info"]
      };
      const [iconClass, iconName] = styles[type] || styles.info;
      toastTitle.textContent = title;
      toastText.textContent = text;
      toastIcon.className = "flex h-9 w-9 shrink-0 items-center justify-center rounded-lg " + iconClass;
      toastIcon.innerHTML = `<i class="${iconName}"></i>`;
      toast.classList.remove("hidden");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.add("hidden"), 3800);
    }

    async function postData(data) {
      await fetch(URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
      });
    }

    logout.addEventListener("click", () => {
      localStorage.removeItem("token");
      localStorage.removeItem("role");
      window.location.href = "login.html";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form));

      try {
        await postData(data);

        msg.textContent = "Terima kasih! Penilaian anda telah dihantar.";
        showToast("Berjaya", msg.textContent, "success");
        form.reset();
      } catch (error) {
        msg.textContent = "Penilaian tidak dapat dihantar. Sila cuba lagi.";
        showToast("Ralat", msg.textContent, "error");
      }
    });
  </script>
</body>
</html>
