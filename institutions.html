<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>SPRAD | Institusi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://script.google.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="icon" type="image/webp" href="https://www.akm.gov.my/templates/yootheme/cache/91/JATA%20NEGARA%20AI-01-91eac591.webp">
  <link rel="apple-touch-icon" href="https://www.akm.gov.my/templates/yootheme/cache/91/JATA%20NEGARA%20AI-01-91eac591.webp">
  <meta name="theme-color" content="#1e40af">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="brand.css">
</head>
<body data-page="institutions" class="min-h-screen bg-slate-50 text-slate-800 antialiased">
  <div id="toast" class="fixed right-4 top-20 z-[100] hidden w-[calc(100%-2rem)] max-w-sm rounded-xl border border-slate-200 bg-white p-4 shadow-xl shadow-slate-200/80">
    <div class="flex gap-3">
      <div id="toastIcon" class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-50 text-blue-600"><i class="fa-solid fa-circle-info"></i></div>
      <div>
        <p id="toastTitle" class="text-sm font-extrabold text-slate-900"></p>
        <p id="toastText" class="mt-1 text-xs font-semibold leading-5 text-slate-500"></p>
      </div>
    </div>
  </div>

  <header class="bg-white border-b border-gray-100 shadow-sm z-50 h-16 sticky top-0">
    <div class="mx-auto flex h-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="./" class="flex items-center gap-3">
        <img src="https://www.akm.gov.my/templates/yootheme/cache/91/JATA%20NEGARA%20AI-01-91eac591.webp" alt="Jata Negara" width="40" height="40" decoding="async" class="h-10 w-10 object-contain drop-shadow-sm">
        <div>
          <p class="text-base font-extrabold tracking-tight text-slate-800">SPRAD</p>
          <p class="text-[9px] font-semibold uppercase tracking-widest text-slate-500">Sistem Penilaian Risiko Audit Dalam</p>
        </div>
      </a>
      <nav class="hidden items-center gap-6 text-xs font-bold uppercase tracking-wide text-slate-600 sm:flex">
        <a href="view" class="hover:text-blue-600">Papan Pemuka</a>
        <button id="logout" type="button" class="rounded-full bg-slate-900 px-4 py-2 text-white transition hover:bg-black">Log keluar</button>
      </nav>
    </div>
  </header>

  <main class="sprad-shell mx-auto grid w-full max-w-7xl gap-4 px-4 py-4 sm:px-6 lg:grid-cols-[18rem_minmax(0,1fr)] lg:px-8">
    <aside class="sprad-sidebar self-start lg:sticky lg:top-16">
      <div class="flex items-center justify-between gap-3">
        <p class="text-[11px] font-extrabold uppercase tracking-widest text-slate-400">Ruang kerja</p>
        <span id="sidebarRole" class="rounded-full bg-blue-50 px-3 py-1 text-[11px] font-extrabold uppercase tracking-wide text-blue-700">Pentadbir</span>
      </div>
      <div class="mt-4 space-y-2">
        <div class="menu-section">Menu utama</div>
        <a href="dashboard" data-nav-route="dashboard" class="menu-item"><i class="fa-solid fa-chart-line w-4"></i>Papan Pemuka</a>
        <a href="form" data-nav-route="form" class="menu-item"><i class="fa-solid fa-clipboard-list w-4"></i>Penilaian risiko</a>
        <a href="ai-intake" data-nav-route="ai-intake" class="menu-item"><i class="fa-solid fa-wand-magic-sparkles w-4"></i>Input AI</a>
        <a href="findings" data-nav-route="findings" class="menu-item"><i class="fa-solid fa-triangle-exclamation w-4"></i>Penemuan</a>
        <a href="corrective-actions" data-nav-route="corrective-actions" class="menu-item"><i class="fa-solid fa-list-check w-4"></i>Tindakan</a>
        <a href="reports" data-nav-route="reports" class="menu-item"><i class="fa-solid fa-print w-4"></i>Laporan</a>
        <div class="menu-section">Pentadbir</div>
        <a href="users" data-nav-route="users" class="menu-item"><i class="fa-solid fa-users-gear w-4"></i>Pengguna</a>
        <a href="settings" data-nav-route="settings" class="menu-item"><i class="fa-solid fa-sliders w-4"></i>Tetapan</a>
      </div>
    </aside>

    <section class="sprad-content grid content-start gap-5">
      <div class="brand-cover rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <p id="pageEyebrow" class="text-xs font-extrabold uppercase tracking-widest text-blue-600"></p>
        <h1 id="pageTitle" class="mt-2 text-2xl font-extrabold tracking-tight text-slate-900 sm:text-3xl"></h1>
        <p id="pageDescription" class="mt-3 max-w-3xl text-sm font-semibold leading-6 text-slate-500"></p>
      </div>

      <div class="grid gap-4 md:grid-cols-4">
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><p class="text-xs font-extrabold uppercase tracking-widest text-slate-400">Jumlah</p><p id="totalCount" class="mt-3 text-3xl font-extrabold text-slate-900">0</p></div>
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><p class="text-xs font-extrabold uppercase tracking-widest text-slate-400">Aktif</p><p id="activeCount" class="mt-3 text-3xl font-extrabold text-emerald-600">0</p></div>
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><p class="text-xs font-extrabold uppercase tracking-widest text-slate-400">Arkib / tidak aktif</p><p id="archivedCount" class="mt-3 text-3xl font-extrabold text-amber-600">0</p></div>
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><p class="text-xs font-extrabold uppercase tracking-widest text-slate-400">Status data</p><p id="cacheStatus" class="mt-3 text-lg font-extrabold text-blue-700">-</p></div>
      </div>

      <div class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_380px]">
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
          <div class="grid gap-3 border-b border-slate-100 bg-slate-50 px-5 py-4 md:grid-cols-[minmax(0,1fr)_auto_auto]">
            <input id="search" type="search" placeholder="Cari rekod..." class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-bold outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
            <button id="refreshBtn" type="button" class="rounded-full border border-slate-200 bg-white px-4 py-3 text-xs font-extrabold text-slate-600 transition hover:bg-slate-100"><i class="fa-solid fa-rotate-right mr-2"></i>Muat semula</button>
            <button id="newBtn" type="button" class="rounded-full bg-blue-600 px-4 py-3 text-xs font-extrabold text-white transition hover:bg-blue-700"><i class="fa-solid fa-plus mr-2"></i>Rekod baharu</button>
          </div>
          <div class="sprad-table-shell">
            <table class="sprad-crud-table sprad-master-table w-full divide-y divide-slate-100">
              <thead><tr><th>Kod</th><th>Nama</th><th>Butiran</th><th>Status</th><th>Tindakan</th></tr></thead>
              <tbody id="recordList" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
          <div class="flex flex-col gap-3 border-t border-slate-100 bg-slate-50 px-5 py-4 sm:flex-row sm:items-center sm:justify-between">
            <p id="paginationSummary" class="text-xs font-bold text-slate-500">0 rekod</p>
            <div class="flex gap-2">
              <button id="prevPage" type="button" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-extrabold text-slate-600 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50">Sebelum</button>
              <button id="nextPage" type="button" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-extrabold text-slate-600 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50">Seterusnya</button>
            </div>
          </div>
        </div>

        <div id="editorCard" class="self-start rounded-2xl border border-slate-200 bg-white p-5 shadow-sm xl:sticky xl:top-20">
          <p id="editorMode" class="text-xs font-extrabold uppercase tracking-widest text-blue-600">Rekod baharu</p>
          <h2 id="editorTitle" class="mt-2 text-xl font-extrabold text-slate-900"></h2>
          <p id="editorHelp" class="mt-2 text-xs font-semibold leading-5 text-slate-500"></p>
          <form id="editorForm" class="mt-4 grid gap-3"></form>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./assets/js/pages/data-master-page.js"></script>
</body>
</html>
