<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daftar akaun</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950 antialiased">
  <main class="min-h-screen px-4 py-6 sm:px-6 lg:px-8">
    <section class="mx-auto grid min-h-[calc(100vh-3rem)] w-full max-w-6xl items-center gap-4 lg:grid-cols-[1.05fr_.95fr]">
      <div class="rounded-3xl border border-white/70 bg-white p-6 shadow-2xl shadow-slate-200/70 sm:p-8">
        <p class="text-xs font-black uppercase tracking-[.22em] text-blue-600">Sistem Kenalan</p>
        <h1 class="mt-3 text-4xl font-black tracking-tight text-slate-950 sm:text-5xl">Daftar akaun</h1>
        <form id="registerForm" class="mt-8 space-y-5">
          <label class="block">
            <span class="text-sm font-bold text-slate-800">Nama pengguna</span>
            <input id="username" name="username" autocomplete="username" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100">
          </label>
          <label class="block">
            <span class="text-sm font-bold text-slate-800">Kata laluan</span>
            <input id="password" name="password" type="password" autocomplete="new-password" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100">
          </label>
          <label class="block">
            <span class="text-sm font-bold text-slate-800">Peranan</span>
            <select id="role" name="role" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base font-bold outline-none transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100">
              <option value="pengguna">Pengguna</option>
              <option value="pentadbir">Pentadbir</option>
            </select>
          </label>
          <button type="submit" class="w-full rounded-2xl bg-blue-600 px-5 py-3.5 text-base font-black text-white shadow-lg shadow-blue-200 transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200">Daftar</button>
        </form>
        <p class="pt-4 text-center text-sm font-bold text-slate-500">Sudah ada akaun? <a href="login.html" class="text-blue-700 hover:text-blue-800">Log masuk</a></p>
        <p id="msg" class="min-h-6 pt-4 text-sm font-bold"></p>
      </div>
      <div class="grid gap-4 sm:grid-cols-2">
        <div class="rounded-3xl border border-white/70 bg-white p-6 shadow-xl shadow-slate-200/60 sm:col-span-2">
          <p class="text-sm font-bold text-slate-500">Peranan sistem</p>
          <p class="mt-2 text-3xl font-black tracking-tight">Pentadbir & Pengguna</p>
        </div>
        <div class="rounded-3xl border border-white/70 bg-blue-600 p-6 text-white shadow-xl shadow-blue-200">
          <p class="text-sm font-bold text-blue-100">Pentadbir</p>
          <p class="mt-8 text-2xl font-black">Lihat semua mesej</p>
        </div>
        <div class="rounded-3xl border border-white/70 bg-white p-6 shadow-xl shadow-slate-200/60">
          <p class="text-sm font-bold text-slate-500">Pengguna</p>
          <p class="mt-8 text-2xl font-black text-emerald-600">Hantar mesej</p>
        </div>
      </div>
    </section>
  </main>
  <script>
    const URL = "https://script.google.com/macros/s/AKfycbyvO77bqueo45EPyAKW6jUK8R5AEIVvFLjqGhlK1Sv5s8N6ay7anY9QhGLSZaIznApkiQ/exec";
    const form = document.querySelector("#registerForm");
    const msg = document.querySelector("#msg");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const params = new URLSearchParams({
        action: "register",
        username: form.username.value,
        password: form.password.value,
        role: form.role.value
      });
      const res = await fetch(URL + "?" + params.toString());
      const data = await res.json();

      if (data.ok) {
        msg.className = "min-h-6 pt-4 text-sm font-bold text-emerald-600";
        msg.textContent = "Akaun berjaya didaftarkan. Sila log masuk.";
        form.reset();
        return;
      }
      msg.className = "min-h-6 pt-4 text-sm font-bold text-red-600";
      msg.textContent = "Pendaftaran gagal. Sila cuba nama pengguna lain.";
    });
  </script>
</body>
</html>
