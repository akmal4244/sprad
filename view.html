<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All submissions</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 1.5rem;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background: #f4f7fb;
      color: #172033;
    }
    main {
      width: min(100%, 44rem);
      margin: 0 auto;
      padding: 2rem;
      background: #fff;
      border-radius: .75rem;
      box-shadow: 0 1rem 2.5rem rgba(23, 32, 51, .12);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    h1 { margin: 0; }
    button {
      padding: .65rem .85rem;
      font: inherit;
      font-weight: 700;
      border: 0;
      border-radius: .45rem;
      background: #2257d6;
      color: #fff;
      cursor: pointer;
    }
    ul { list-style: none; margin: 0; padding: 0; }
    li { padding: 1rem 0; border-top: 1px solid #dbe2ef; }
    li:first-child { border-top: 0; }
    p { margin: .5rem 0; }
    small { color: #607089; }
    @media (max-width: 34rem) {
      header { align-items: flex-start; flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>All submissions</h1>
      <button id="logout" type="button">Log out</button>
    </header>
    <ul id="list"></ul>
  </main>
  <script>
    const URL = "https://script.google.com/macros/s/AKfycbyvO77bqueo45EPyAKW6jUK8R5AEIVvFLjqGhlK1Sv5s8N6ay7anY9QhGLSZaIznApkiQ/exec";
    const list = document.querySelector("#list");
    const logout = document.querySelector("#logout");

    function goToLogin() {
      window.location.href = "login.html";
    }

    function showMessage(text) {
      list.innerHTML = "";
      const item = document.createElement("li");
      item.textContent = text;
      list.append(item);
    }

    function renderContact(contact) {
      const item = document.createElement("li");
      const name = document.createElement("strong");
      const email = document.createElement("span");
      const message = document.createElement("p");
      const createdAt = document.createElement("small");

      name.textContent = contact.name || "";
      email.textContent = ` (${contact.email || ""})`;
      message.textContent = contact.message || "";
      createdAt.textContent = contact.created_at || "";

      item.append(name, email, message, createdAt);
      list.append(item);
    }

    logout.addEventListener("click", () => {
      localStorage.removeItem("token");
      goToLogin();
    });

    async function loadSubmissions() {
      const token = localStorage.getItem("token");
      if (!token) {
        goToLogin();
        return;
      }

      const params = new URLSearchParams({ action: "getContacts", token });
      const res = await fetch(URL + "?" + params.toString());
      const data = await res.json();

      if (!data.ok) {
        localStorage.removeItem("token");
        goToLogin();
        return;
      }

      const contacts = Array.isArray(data.contacts) ? data.contacts : [];
      list.innerHTML = "";
      if (contacts.length === 0) {
        showMessage("No submissions yet");
        return;
      }
      contacts.forEach(renderContact);
    }

    loadSubmissions();
  </script>
</body>
</html>
