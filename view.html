<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All submissions</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel panel-wide">
      <div class="topbar">
        <div>
          <p class="brand">Contact Desk</p>
          <h1>All submissions</h1>
        </div>
        <button id="logout" class="button-secondary" type="button">Log out</button>
      </div>
      <ul id="list" class="list"></ul>
    </section>
  </main>
  <script>
    const URL = "https://script.google.com/macros/s/AKfycbyvO77bqueo45EPyAKW6jUK8R5AEIVvFLjqGhlK1Sv5s8N6ay7anY9QhGLSZaIznApkiQ/exec";
    const list = document.querySelector("#list");
    const logout = document.querySelector("#logout");

    function goToLogin() {
      window.location.href = "login.html";
    }

    function showMessage(text) {
      list.innerHTML = "";
      const item = document.createElement("li");
      item.textContent = text;
      list.append(item);
    }

    function renderContact(contact) {
      const item = document.createElement("li");
      const name = document.createElement("strong");
      const email = document.createElement("span");
      const message = document.createElement("p");
      const createdAt = document.createElement("small");

      name.textContent = contact.name || "";
      email.textContent = ` (${contact.email || ""})`;
      message.textContent = contact.message || "";
      createdAt.textContent = contact.created_at || "";

      item.append(name, email, message, createdAt);
      list.append(item);
    }

    logout.addEventListener("click", () => {
      localStorage.removeItem("token");
      goToLogin();
    });

    async function loadSubmissions() {
      const token = localStorage.getItem("token");
      if (!token) {
        goToLogin();
        return;
      }

      const params = new URLSearchParams({ action: "getContacts", token });
      const res = await fetch(URL + "?" + params.toString());
      const data = await res.json();

      if (!data.ok) {
        localStorage.removeItem("token");
        goToLogin();
        return;
      }

      const contacts = Array.isArray(data.contacts) ? data.contacts : [];
      list.innerHTML = "";
      if (contacts.length === 0) {
        showMessage("No submissions yet");
        return;
      }
      contacts.forEach(renderContact);
    }

    loadSubmissions();
  </script>
</body>
</html>
