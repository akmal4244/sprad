<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background: #f4f7fb;
      color: #172033;
    }
    main {
      width: min(100%, 28rem);
      padding: 2rem;
      background: #fff;
      border-radius: .75rem;
      box-shadow: 0 1rem 2.5rem rgba(23, 32, 51, .12);
    }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 1rem; font-weight: 700; }
    input, button {
      width: 100%;
      margin-top: .4rem;
      padding: .75rem;
      font: inherit;
      border-radius: .45rem;
    }
    input { border: 1px solid #b8c2d6; }
    button {
      margin-top: 1.25rem;
      border: 0;
      background: #2257d6;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    #msg { min-height: 1.5rem; font-weight: 700; color: #b42318; }
  </style>
</head>
<body>
  <main>
    <h1>Sign in</h1>
    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" name="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
      <button type="submit">Sign in</button>
    </form>
    <p id="msg"></p>
  </main>
  <script>
    const URL = "https://script.google.com/macros/s/AKfycbyvO77bqueo45EPyAKW6jUK8R5AEIVvFLjqGhlK1Sv5s8N6ay7anY9QhGLSZaIznApkiQ/exec";
    const form = document.querySelector("#loginForm");
    const msg = document.querySelector("#msg");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const params = new URLSearchParams({
        action: "login",
        username: form.username.value,
        password: form.password.value
      });
      const res = await fetch(URL + "?" + params.toString());
      const data = await res.json();

      if (data.ok) {
        localStorage.setItem("token", data.token);
        window.location.href = "view.html";
        return;
      }
      msg.textContent = data.error;
    });
  </script>
</body>
</html>
